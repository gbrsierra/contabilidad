<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contabilidad Personal | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#818cf8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Finanzas">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div class="app-container">
        <!-- Mobile Header -->
        <div class="mobile-header">
            <div class="logo">
                <span class="logo-icon">💰</span>
                <h1>Finanzas</h1>
            </div>
            <button id="menuToggle" class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>

        <!-- Sidebar para años -->
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <span class="logo-icon">💰</span>
                <h1>Finanzas</h1>
            </div>
            <nav class="year-nav">
                <h3>Años</h3>
                <ul id="yearList">
                    <!-- Dinámico -->
                </ul>
                <button id="addYearBtn" class="btn-secondary">+ Añadir Año</button>
            </nav>

            <div class="sidebar-footer">
                <div class="sync-section">
                    <h3>Sincronización</h3>
                    <div class="sync-actions">
                        <button id="exportBtn" class="btn-icon-text" title="Exportar Datos">
                            <span>📤</span> Exportar
                        </button>
                        <button id="importBtn" class="btn-icon-text" title="Importar Datos">
                            <span>📥</span> Importar
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="header-info">
                    <h2 id="currentYearTitle">Dashboard 2024</h2>
                    <p class="subtitle">Resumen mensual de tus cuentas</p>
                </div>
                <div class="header-actions">
                    <span id="syncIndicator" class="sync-indicator">☁️ Conectando...</span>
                    <button id="toggleMonthsBtn" class="btn-secondary">Ocultar meses con datos</button>
                    <button id="addAccountBtn" class="btn-primary">+ Nueva Cuenta</button>
                </div>
            </header>


            <!-- Tabla de Datos -->
            <section class="table-container glass">
                <div class="table-scroll">
                    <table id="financeTable">
                        <thead>
                            <tr id="tableHeader">
                                <th>Mes</th>
                                <!-- Cuentas dinámicas -->
                                <th class="col-total">Total Mensual</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Filas dinámicas por mes -->
                        </tbody>
                        <tfoot>
                            <tr id="tableFooter">
                                <!-- Dinámico -->
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modales -->
    <div id="accountModal" class="modal">
        <div class="modal-content glass">
            <h3>Nueva Cuenta</h3>
            <div class="form-group">
                <label for="accountName">Nombre de la cuenta</label>
                <input type="text" id="accountName" placeholder="Ej: Banco Santander, Efectivo...">
            </div>
            <div class="modal-actions">
                <button id="cancelModal" class="btn-text">Cancelar</button>
                <button id="saveAccount" class="btn-primary">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>

    <!-- Progressive Web App: Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registrado con éxito.', reg.scope))
                    .catch(err => console.log('Fallo al registrar el Service Worker.', err));
            });
        }
    </script>
</body>
</html>
